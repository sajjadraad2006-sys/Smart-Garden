# Mosquitto MQTT Broker — AgriMaster Pro
# B-01: This config was referenced by install.sh but never created

listener 1883 0.0.0.0
allow_anonymous true
max_connections 50
persistent_client_expiration 1d

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_type error
log_type warning
log_type information
log_dest stdout

# For production with authentication, uncomment below:
# allow_anonymous false
# password_file /etc/mosquitto/passwd
