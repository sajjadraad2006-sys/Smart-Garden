# AgriMaster Pro — Master System Configuration
system:
  name: "AgriMaster Pro"
  version: "1.0.1"
  simulation_mode: true

# C-01: Location for daytime/timezone calculations
location:
  city: "Basra"
  country: "Iraq"
  latitude: 30.5085
  longitude: 47.7834
  timezone: "Asia/Baghdad"
  utc_offset_hours: 3

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

mqtt:
  broker: "localhost"
  port: 1883
  keepalive: 60
  topics:
    sensors: "agrimaster/sensors"
    status: "agrimaster/status"
    commands: "agrimaster/commands"
  client_id: "agrimaster_backend"
  device_id: "agrimaster_01"

database:
  path: "database/agrimaster.db"
  max_readings_age_days: 90
  vacuum_interval_hours: 24

algorithm:
  cycle_interval_seconds: 30
  history_window_readings: 60
  sensor_read_interval_ms: 5000
  plausibility:
    temperature: [-20.0, 60.0]
    humidity: [0.0, 100.0]
    soil_moisture: [0.0, 100.0]
    soil_temp: [-10.0, 60.0]
    ph: [0.0, 14.0]
    light_lux: [0.0, 200000.0]
    co2_ppm: [0.0, 10000.0]
    wind_kmh: [0.0, 200.0]
    rainfall_mm: [0.0, 500.0]
    power_w: [0.0, 5000.0]
  outlier_sigma: 2.5
  consecutive_suspect_fault: 5
  irrigation:
    pump_flow_lpm: 2.0
    min_duration_sec: 30
    max_duration_sec: 600
    midday_suppress_start: 11
    midday_suppress_end: 14
    predictive_minutes_threshold: 45
    critical_moisture_factor: 0.85
  ph:
    hysteresis_band: 0.3
    min_dose_seconds: 5
    max_dose_seconds: 30
    equilibration_hours: 2
    safety_window_hours: 4
    spike_threshold: 1.0
    spike_window_minutes: 30
  ventilation:
    night_max_speed_pct: 30
    humidity_force_min_pct: 40
    critical_temp: 42.0
  misting:
    high_deficit_threshold: 15
    medium_deficit_threshold: 8
    high_duration_sec: 30
    medium_duration_sec: 15
    high_cooldown_min: 15
    medium_cooldown_min: 20
    wind_suppress_kmh: 20
    rain_suppress_mm: 2
  fertilizer:
    germination_no_fertilize: true
    vegetative_interval_days: 14
    flowering_interval_days: 10
    dose_duration_sec: 10
    post_dose_irrigation_delay_sec: 30
    post_dose_irrigation_duration_sec: 120
  lighting:
    optimal_dli_klux_hours: 30
  conflicts:
    max_simultaneous_relays: 3

alerts:
  deduplication_minutes: 30
  thresholds:
    temp_lethal_high: 42.0
    temp_frost: 0.0
    soil_critical_dry: 15.0
    ph_survivable_low: 4.0
    ph_survivable_high: 9.0
    co2_dangerous: 2000.0
    power_high: 200.0
    ph_spike_change: 1.5
    ph_spike_hours: 1.0

websocket:
  path: "/ws/live"
  ping_interval: 30
  ping_timeout: 10

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
